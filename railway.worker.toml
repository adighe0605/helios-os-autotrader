# Railway config for the Celery WORKER service.
# In Railway dashboard: set "Config File Path" to railway.worker.toml

[build]
  builder        = "DOCKERFILE"
  dockerfilePath = "docker/backend.Dockerfile"
  buildContext   = "backend"

[deploy]
  startCommand            = "celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=2"
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 5
