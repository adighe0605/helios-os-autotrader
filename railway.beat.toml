# Railway config for the Celery BEAT service.
# In Railway dashboard: set "Config File Path" to railway.beat.toml

[build]
  builder        = "DOCKERFILE"
  dockerfilePath = "docker/backend.Dockerfile"
  buildContext   = "backend"

[deploy]
  startCommand            = "celery -A app.workers.celery_app beat --loglevel=INFO"
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 3
