version: "3.9"

# Production compose — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes: []        # no live-reload mount in production

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=WARNING --concurrency=2
    volumes: []

  beat:
    command: celery -A app.workers.celery_app beat --loglevel=WARNING
    volumes: []

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.prod.Dockerfile
    command: ""        # handled by prod Dockerfile CMD
    volumes: []
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:8000/ws}
