# Railway config for the API service.
# This file is used by the "api" Railway service.
# The "worker" and "beat" services use the same Dockerfile
# but override the start command in Railway dashboard settings.

[build]
  builder        = "DOCKERFILE"
  dockerfilePath = "docker/backend.Dockerfile"
  buildContext   = "backend"

[deploy]
  startCommand            = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  healthcheckPath         = "/health"
  healthcheckTimeout      = 30
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 5
